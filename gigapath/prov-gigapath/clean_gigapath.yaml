name: gigapath
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.9
  - pytorch=2.5.1
  - torchvision=0.20.1
  - torchaudio
  - pytorch-cuda=11.8

  # core scientific stack
  - numpy=1.26.4
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - h5py
  - pillow
  - tqdm

  - pip
  - pip:
      - flash-attn==2.5.8
      - xformers==0.0.18
      - omegaconf
      - torchmetrics==0.10.3
      - fvcore
      - iopath
      - huggingface-hub==0.20.2
      - einops
      - webdataset
      - lifelines
      - scikit-survival
      - tensorboard
      - fairscale
      - wandb
      - timm
      - packaging==23.2
      - ninja==1.11.1.1
      - transformers==4.36.2
